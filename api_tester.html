<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTool API Tester v1.5</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #top-buttons {
      padding: 6px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      padding: 6px 10px;
      border: 1px solid #888;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #e8e8e8;
    }

    #api-base-panel {
      padding: 4px 8px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #left {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      border-right: 1px solid #ccc;
    }

    #log-panel {
      width: 40%;
      padding: 10px;
      overflow-y: auto;
      background: #fafafa;
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>

  <script src="api_test.js"></script>
</head>

<body>

  <!-- 上部ボタン群 -->
  <div id="top-buttons">
    <button onclick="callApi('/init')">初期化</button>
    <button onclick="callApi('/dump')">ダンプ</button>
    <button onclick="callApi('/health')">ヘルスチェック</button>

    <button onclick="callApi('/scatter?mode=raw')">生データ</button>
    <button onclick="callApi('/scatter?mode=cluster')">クラスタリング</button>
    <button onclick="callApi('/scatter?mode=dense')">濃い意見</button>

    <button onclick="callApi('/compare')">比較</button>
    <button onclick="callApi('/filter')">フィルタ</button>

    <button onclick="callApi('/hierarchy?mode=cluster')">階層ビュー</button>
  </div>

  <!-- API Base 表示 -->
  <div id="api-base-panel">
    API: <span id="api-base-text"></span>
  </div>

  <!-- メイン領域 -->
  <div id="main">
    <div id="left">
      <h3>API Tester</h3>
      <p>上のボタンを押すと API を呼び出し、右側に結果が表示されます。</p>
    </div>

    <div id="log-panel"></div>
  </div>

</body>
</html>
