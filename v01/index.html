<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTools UI</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 上部ボタンパネル */
    #top-panel {
      height: 60px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }
    #top-panel button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 中央エリア（チャート + 右パネル） */
    #middle {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 左：チャート */
    #chart-area {
      flex: 1;
      border-right: 1px solid #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #plot {
      width: 100%;
      height: 100%;
    }

    /* 右：意見パネル */
    #right-panel {
      width: 320px;
      background: #fafafa;
      border-left: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }
    #right-panel h3 {
      margin-top: 0;
    }

    /* 下：デバッグログ */
    #bottom-panel {
      height: 160px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      overflow-y: auto;
      border-top: 1px solid #444;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <!-- 上部ボタンパネル -->
  <div id="top-panel">
    <button onclick="loadScatter()">Load 30 Points</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>

  <!-- 中央（チャート + 右パネル） -->
  <div id="middle">
    <div id="chart-area">
      <div id="plot"></div>
    </div>

    <div id="right-panel">
      <h3>意見</h3>
      <div id="opinion-text">点をクリックすると表示されます。</div>
    </div>
  </div>

  <!-- 下部デバッグログ -->
  <div id="bottom-panel" id="log"></div>

  <script src="data.js"></script>
  <script src="scatter.js"></script>

  <script>
    function log(msg) {
      const panel = document.getElementById("bottom-panel");
      panel.textContent += msg + "\n";
      panel.scrollTop = panel.scrollHeight;
    }

    function clearLog() {
      document.getElementById("bottom-panel").textContent = "";
    }

    async function loadScatter() {
      log("Requesting scatter data...");
      const data = await window.api.getScatterData();
      log("Data received: " + data.points.length + " points");
      window.buildScatterPlot(data);
    }
  </script>

</body>
</html>
