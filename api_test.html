<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Public Hearing AI 4.0 API Tester</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 16px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 4px;
    }
    #config {
      margin-bottom: 12px;
      padding: 8px;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    label {
      font-size: 0.9rem;
    }
    input[type="text"] {
      width: 420px;
      padding: 4px 6px;
      font-size: 0.9rem;
    }
    #test-buttons {
      margin: 8px 0;
    }
    .test-button {
      margin: 2px;
      padding: 4px 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .run-all {
      margin-left: 8px;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-weight: bold;
      background: #0044cc;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      background: #fff;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 4px 6px;
      font-size: 0.8rem;
      vertical-align: top;
    }
    th {
      background: #eee;
    }
    #log {
      margin-top: 8px;
      padding: 8px;
      background: #111;
      color: #eee;
      font-family: Menlo, Monaco, Consolas, monospace;
      font-size: 0.75rem;
      height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      border-radius: 4px;
    }
    .toolbar {
      margin-top: 6px;
      font-size: 0.8rem;
    }
    .toolbar button {
      margin-right: 4px;
      padding: 3px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Public Hearing AI 4.0 API Tester</h1>
  <div id="config">
    <div>
      <label for="api-base">API Base URL:</label>
      <input id="api-base" type="text" value="https://didactic-parakeet-xgrr599556rhpx65-8005.app.github.dev" />
      <button id="btn-ping">接続確認</button>
      <span id="ping-status"></span>
    </div>
    <div id="test-buttons"></div>
    <div class="toolbar">
      <button id="btn-run-all">Run All</button>
      <button id="btn-clear-results">結果クリア</button>
      <button id="btn-save-json">結果をJSON保存</button>
      <button id="btn-save-txt">結果をTXT保存</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Test</th>
        <th>Result</th>
        <th>Duration(ms)</th>
        <th>Detail</th>
      </tr>
    </thead>
    <tbody id="result-body"></tbody>
  </table>

  <div id="log"></div>

  <script src="api_tester.js"></script>
</body>
</html>
