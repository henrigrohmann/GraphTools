<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphTool</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #top-buttons {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
      flex-wrap: wrap;
    }

    #top-buttons button,
    #top-buttons a {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: inherit;
      text-decoration: none;
    }

    #api-base {
      padding: 4px 10px;
      font-size: 12px;
      color: #444;
      border-bottom: 1px solid #ddd;
      background: #fcfcfc;
    }

    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    #plot-area {
      flex: 1;
      border-right: 1px solid #ccc;
      min-width: 0;
    }

    #plot {
      width: 100%;
      height: 100%;
    }

    #right-panel {
      width: 360px;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    #right-tabs {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
    }

    .tab-btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .tab-btn.active {
      background: #0b66c3;
      color: #fff;
      border-color: #0b66c3;
    }

    #tab-contents {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
      min-height: 0;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    #detail-content,
    #hierarchy-content {
      line-height: 1.5;
      white-space: normal;
      word-break: break-word;
    }

    #log-panel {
      height: 140px;
      border-top: 1px solid #ccc;
      background: #111;
      color: #0f0;
      font-size: 12px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    #footer-panel {
      padding: 6px 10px;
      font-size: 12px;
      background: #f0f0f0;
      border-top: 1px solid #ccc;
      color: #333;
    }
  </style>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script defer src="./scatter.js"></script>
</head>
<body>
  <div id="top-buttons">
    <button onclick="checkHealth()">ヘルスチェック</button>
    <button onclick="loadScatter('raw')">生データ</button>
    <button onclick="loadScatter('random')">ランダム</button>
    <button onclick="loadScatter('cluster')">クラスタリング</button>
    <button onclick="loadScatter('dense')">濃い意見</button>
    <a href="./api_tester.html" target="_blank" rel="noopener noreferrer">APIテスター</a>
  </div>

  <div id="api-base">API Base: <span id="api-base-text"></span></div>

  <div id="main-area">
    <div id="plot-area">
      <div id="plot"></div>
    </div>

    <div id="right-panel">
      <div id="right-tabs">
        <button class="tab-btn active" data-tab="detail">詳細</button>
        <button class="tab-btn" data-tab="hierarchy">階層ビュー</button>
      </div>

      <div id="tab-contents">
        <div id="tab-detail" class="tab-content active">
          <div id="detail-content">点をクリックすると詳細が表示されます。</div>
        </div>
        <div id="tab-hierarchy" class="tab-content">
          <div id="hierarchy-content">階層データを読み込み中です。</div>
        </div>
      </div>
    </div>
  </div>

  <div id="log-panel"></div>
  <div id="footer-panel">現在地: <span id="breadcrumb-text">散布図</span></div>
</body>
</html>
