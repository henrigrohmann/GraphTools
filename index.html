<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphTool v1.8.2</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左パネル */
    #left-panel {
      flex: 3;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
    }

    /* 上部ボタン */
    #top-buttons {
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #f8f8f8;
    }
    #top-buttons button {
      margin-right: 6px;
    }

    /* API Base */
    #api-base-box {
      padding: 6px 10px;
      background: #eef;
      border-bottom: 1px solid #ccd;
      font-size: 14px;
    }

    /* メイン描画領域 */
    #main-view {
      flex: 1;
      position: relative;
    }
    #plot {
      width: 100%;
      height: 100%;
    }

    /* 右パネル */
    #right-panel {
      flex: 1.2;
      display: flex;
      flex-direction: column;
    }

    /* タブ */
    #right-tabs {
      display: flex;
      gap: 6px;
      padding: 6px;
      border-bottom: 1px solid #ccc;
      background: #f5f5f5;
    }
    .tab-btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .tab-btn.active {
      background: #0b66c3;
      color: #fff;
      border-color: #0b66c3;
    }

    /* タブ内容 */
    .tab-content {
      display: none;
      padding: 10px;
      overflow-y: auto;
      flex: 1;
    }
    .tab-content.active {
      display: block;
    }

    /* パンくず */
    #breadcrumb-wrapper {
      padding: 8px;
      border-top: 1px solid #ccc;
      background: #fafafa;
      font-size: 14px;
    }

    /* ログパネル */
    #log-panel {
      height: 120px;
      border-top: 1px solid #ccc;
      overflow-y: auto;
      padding: 6px;
      background: #f7f7f7;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <!-- 左パネル -->
  <div id="left-panel">

    <!-- 上部ボタン -->
    <div id="top-buttons">
      <button onclick="loadDefault()">初期化</button>
      <button onclick="dumpData()">ダンプ</button>
      <button onclick="checkHealth()">ヘルスチェック</button>

      <button onclick="loadScatter('raw')">生データ</button>
      <button onclick="loadScatter('cluster')">クラスタリング</button>
      <button onclick="loadScatter('dense')">濃い意見</button>
      <button onclick="loadScatter('treemap')">ツリーマップ</button>
      <button onclick="filterCluster()">フィルタ</button>
    </div>

    <!-- API Base -->
    <div id="api-base-box">
      API: <span id="api-base-text"></span>
    </div>

    <!-- メイン描画領域 -->
    <div id="main-view">
      <div id="plot"></div>
    </div>

    <!-- ログパネル -->
    <div id="log-panel"></div>
  </div>

  <!-- 右パネル -->
  <div id="right-panel">

    <!-- タブ -->
    <div id="right-tabs">
      <button class="tab-btn active" data-tab="detail">詳細</button>
      <button class="tab-btn" data-tab="hierarchy">階層ビュー</button>
    </div>

    <!-- タブ内容 -->
    <div id="tab-detail" class="tab-content active">
      <div id="detail-content">準備中…</div>
    </div>

    <div id="tab-hierarchy" class="tab-content">
      <div id="hierarchy-content">準備中…</div>
    </div>

    <!-- パンくず -->
    <div id="breadcrumb-wrapper">
      <span id="breadcrumb-text"></span>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="charts.js"></script>

</body>
</html>
