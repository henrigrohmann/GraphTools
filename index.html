<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTools</title>

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <style>
    #scatter-container {
      width: 100%;
      height: 400px;
    }
    #log-panel {
      font-size: 10px;
      white-space: pre-wrap;
      background: #fafafa;
      border-top: 1px solid #ccc;
      padding: 8px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div id="scatter-container"></div>
  <div id="log-panel"></div>

  <!-- ★★★ 1. scatter.js を必ず最初に読み込む（export なし版） -->
  <script src="scatter.js"></script>

  <!-- ★★★ 2. data.js（fetch して scatterData を返す） -->
  <script src="data.js"></script>

  <!-- ★★★ 3. index.js（ここで renderScatter を呼ぶ） -->
  <script>
    console.log("index.js inline start");

    fetch("data30.csv")
      .then(r => r.text())
      .then(text => {
        console.log("CSV loaded");
        const rows = text.trim().split("\n").slice(1);
        const data = rows.map(line => {
          const [id, cluster_id, x, y, text] = line.split(",");
          return { id, cluster_id, x, y, text };
        });

        console.log("Calling renderScatter...");
        window.renderScatter("scatter-container", data, p => {
          console.log("Clicked:", p);
        });
      })
      .catch(err => console.error("CSV load error:", err));
  </script>

</body>
</html>
