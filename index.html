<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphTool</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #left-panel {
      width: 260px;
      border-right: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #plot {
      flex: 1;
      border-bottom: 1px solid #ccc;
    }

    #right-panel {
      width: 360px;
      border-left: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }

    /* --- タブ UI --- */
    #right-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tab-btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .tab-btn.active {
      background: #0b66c3;
      color: #fff;
      border-color: #0b66c3;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    #hierarchy-content {
      font-size: 13px;
      line-height: 1.5;
      padding-left: 4px;
    }
  </style>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script defer src="./scatter.js"></script>
</head>

<body>
  <!-- 左パネル -->
  <div id="left-panel">
    <h3>GraphTool</h3>
    <button onclick="loadScatter('raw')">RAW</button>
    <button onclick="loadScatter('random')">RANDOM</button>
    <button onclick="loadScatter('cluster')">CLUSTER</button>
    <button onclick="loadScatter('dense')">DENSE</button>
  </div>

  <!-- メイン -->
  <div id="main">
    <div id="plot"></div>
  </div>

  <!-- 右パネル -->
  <div id="right-panel">
    <div id="right-tabs">
      <button class="tab-btn active" data-tab="detail">詳細</button>
      <button class="tab-btn" data-tab="hierarchy">階層ビュー</button>
    </div>

    <div id="tab-contents">
      <!-- 詳細タブ -->
      <div id="tab-detail" class="tab-content active">
        <div id="detail-content"></div>
      </div>

      <!-- 階層ビュータブ -->
      <div id="tab-hierarchy" class="tab-content">
        <div id="hierarchy-content">
          <!-- 階層ビューがここに描画される -->
        </div>
      </div>
    </div>
  </div>
</body>
</html>
