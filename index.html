<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GraphTool v1.5</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左パネル（メイン表示） */
        #left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
        }

        /* 上部ボタン群 */
        #top-buttons {
            padding: 8px;
            border-bottom: 1px solid #ccc;
            background: #f8f8f8;
        }
        #top-buttons button {
            margin-right: 6px;
        }

        /* API Base 表示 */
        #api-base-box {
            padding: 6px 10px;
            background: #eef;
            border-bottom: 1px solid #ccd;
            font-size: 14px;
        }

        /* メイン描画領域 */
        #main-view {
            flex: 1;
            position: relative;
        }
        #scatter-plot {
            width: 100%;
            height: 100%;
        }

        /* 右パネル */
        #right-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
        }

        /* タブ */
        #tabs {
            display: flex;
            border-bottom: 1px solid #ccc;
        }
        .tab {
            padding: 10px;
            cursor: pointer;
            border-right: 1px solid #ccc;
            background: #f0f0f0;
        }
        .tab.active {
            background: #fff;
            font-weight: bold;
        }

        /* タブ内容 */
        #tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* パンくず */
        #breadcrumb {
            padding: 8px;
            border-top: 1px solid #ccc;
            background: #fafafa;
            font-size: 14px;
        }

        /* ログパネル */
        #log-panel {
            height: 120px;
            border-top: 1px solid #ccc;
            overflow-y: auto;
            padding: 6px;
            background: #f7f7f7;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- 左パネル -->
    <div id="left-panel">

        <!-- 上部ボタン群 -->
        <div id="top-buttons">
            <button onclick="initPipelines()">初期化</button>
            <button onclick="dump()">ダンプ</button>
            <button onclick="health()">ヘルスチェック</button>

            <button onclick="loadRaw()">生データ</button>
            <button onclick="loadCluster()">クラスタリング</button>
            <button onclick="loadDense()">濃い意見</button>
            <button onclick="loadRandom()">比較</button>
            <button onclick="filterCluster()">フィルタ</button>
        </div>

        <!-- API Base 表示 -->
        <div id="api-base-box">
            API: <span id="api-base-text"></span>
        </div>

        <!-- メイン描画領域 -->
        <div id="main-view">
            <div id="scatter-plot"></div>
        </div>

        <!-- ログパネル -->
        <div id="log-panel"></div>
    </div>

    <!-- 右パネル -->
    <div id="right-panel">

        <!-- タブ -->
        <div id="tabs">
            <div class="tab active" onclick="switchTab('detail')">詳細</div>
            <div class="tab" onclick="switchTab('hierarchy')">階層ビュー</div>
        </div>

        <!-- タブ内容 -->
        <div id="tab-content">
            <div id="detail-view">準備中…</div>
            <div id="hierarchy-view" style="display:none;">準備中…</div>
        </div>

        <!-- パンくず -->
        <div id="breadcrumb">準備中…</div>
    </div>

    <!-- JS -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="scatter.js"></script>

</body>
</html>
