<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GraphTool UI Final</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ============================
     1. ボタンパネル（最上部）
     ============================ */
  #top-panel {
    border-bottom: 1px solid #ccc;
    background: #f8f8f8;
    padding: 6px 10px;
  }

  .button-row {
    margin-bottom: 6px;
  }

  .button-row button {
    margin-right: 6px;
  }

  #api-path-box {
    margin-top: 4px;
  }
  #api-path-input {
    width: 60%;
    padding: 4px;
    font-size: 14px;
  }

  /* ============================
     2. 中央領域（チャート＋右パネル）
     ============================ */
  #center-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* 左：チャート */
  #chart-area {
    flex: 7;
    border-right: 1px solid #ccc;
    position: relative;
  }
  #chart-placeholder {
    width: 100%;
    height: 100%;
    background: #eef3ff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 20px;
  }

  /* 右：詳細パネル */
  #right-panel {
    flex: 3;
    display: flex;
    flex-direction: column;
  }

  #right-tabs {
    display: flex;
    gap: 6px;
    padding: 6px;
    border-bottom: 1px solid #ccc;
    background: #f5f5f5;
  }

  .tab-btn {
    padding: 6px 10px;
    border: 1px solid #ccc;
    background: #f0f0f0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .tab-btn.active {
    background: #0b66c3;
    color: #fff;
    border-color: #0b66c3;
  }

  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  /* ============================
     3. 下部パネル（デバッグ領域）
     ============================ */
  #bottom-panel {
    height: 160px;
    display: flex;
    border-top: 1px solid #ccc;
  }

  /* 左：デバッグログ */
  #debug-panel {
    flex: 7;
    padding: 6px;
    overflow-y: auto;
    background: #fafafa;
    border-right: 1px solid #ccc;
  }

  /* 右：小パネル（切替・DL・折りたたみ） */
  #debug-controls {
    flex: 3;
    padding: 6px;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #debug-controls button {
    padding: 6px;
    font-size: 13px;
  }

  /* 折りたたみ時のクラス（実装は後で） */
  .collapsed #debug-panel {
    display: none;
  }
  .collapsed #debug-controls {
    flex: 1;
  }

  /* ============================
     4. 最下段：パンくず＋ステータス
     ============================ */
  #breadcrumb-status-bar {
    height: 32px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    border-top: 1px solid #ccc;
    background: #fdfdfd;
    font-size: 14px;
  }

  #breadcrumb {
    flex: 7;
    color: #444;
  }

  #status-indicator {
    flex: 3;
    text-align: right;
    color: #0b66c3;
    font-weight: bold;
  }
</style>
</head>

<body>

<!-- ============================
     1. ボタンパネル
     ============================ -->
<div id="top-panel">

  <!-- 管理者ボタン -->
  <div class="button-row">
    <button>初期化</button>
    <button>ダンプ</button>
    <button>ヘルスチェック</button>
    <button>CSV アップロード</button>
    <button>API テスト</button>
  </div>

  <!-- 閲覧者ボタン -->
  <div class="button-row">
    <button>生データ</button>
    <button>クラスタリング</button>
    <button>濃い意見</button>
    <button>ツリーマップ</button>
    <button>フィルタ</button>
  </div>

  <!-- API パス編集 -->
  <div id="api-path-box">
    API パス: <input id="api-path-input" type="text" value="https://example.com/api" />
  </div>

</div>

<!-- ============================
     2. 中央領域
     ============================ -->
<div id="center-area">

  <!-- 左：チャート -->
  <div id="chart-area">
    <div id="chart-placeholder">チャート表示領域</div>
  </div>

  <!-- 右：詳細パネル -->
  <div id="right-panel">

    <div id="right-tabs">
      <button class="tab-btn active">詳細</button>
      <button class="tab-btn">階層ビュー</button>
    </div>

    <div id="detail-content" class="tab-content active">
      詳細情報がここに表示されます。
    </div>

    <div id="hierarchy-content" class="tab-content">
      階層ビューがここに表示されます。
    </div>

  </div>

</div>

<!-- ============================
     3. 下部パネル（デバッグ）
     ============================ -->
<div id="bottom-panel">

  <!-- 左：デバッグログ -->
  <div id="debug-panel">
    デバッグログがここに表示されます。
  </div>

  <!-- 右：小パネル -->
  <div id="debug-controls">
    <button>表示切替（ログ／ダンプ）</button>
    <button>ダンプダウンロード</button>
    <button>折りたたみ</button>
  </div>

</div>

<!-- ============================
     4. 最下段：パンくず＋ステータス
     ============================ -->
<div id="breadcrumb-status-bar">
  <div id="breadcrumb">パンくずリスト</div>
  <div id="status-indicator">ステータス</div>
</div>

</body>
</html>
