<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTool Scatter Demo</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #top-bar {
      padding: 10px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
    }

    .btn {
      padding: 8px 14px;
      margin-right: 10px;
      background: #0078d4;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn:hover {
      background: #005fa3;
    }

    #chart {
      flex: 1;
      min-height: 400px;
    }

    #debug-panel {
      height: 180px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      overflow-y: scroll;
      border-top: 2px solid #444;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <button class="btn" onclick="runPipeline('raw')">RAW</button>
    <button class="btn" onclick="runPipeline('random')">RANDOM</button>
    <button class="btn" onclick="runPipeline('cluster')">CLUSTER</button>
    <span id="status" style="margin-left:20px;"></span>
  </div>

  <div id="chart"></div>

  <div id="debug-panel"></div>

  <script src="scatter.js"></script>
</body>
</html>
