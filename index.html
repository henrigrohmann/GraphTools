<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>GraphTool</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script defer src="./scatter.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #plot {
            flex: 1;
        }

        #right-panel {
            width: 360px;
            background: #fafafa;
            border-left: 1px solid #ddd;
            padding: 16px;
            overflow-y: auto;
        }

        .label {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }

        .value {
            font-size: 14px;
            margin-bottom: 8px;
            white-space: pre-wrap;
        }

        #buttons {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 10;
        }

        button {
            margin-right: 8px;
            padding: 6px 12px;
        }
    </style>
</head>

<body>

<div id="buttons">
    <button onclick="runPipeline('raw')">RAW</button>
    <button onclick="runPipeline('random')">RANDOM</button>
    <button onclick="runPipeline('cluster')">CLUSTER</button>
</div>

<div id="plot"></div>

<div id="right-panel">
    <h3>詳細</h3>
    <div id="detail-content">点をクリックしてください</div>
</div>

</body>
</html>
