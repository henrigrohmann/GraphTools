<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTool Scatter Demo</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    #chart {
      width: 100%;
      height: 600px;
      border: 1px solid #ccc;
    }
    .btn {
      padding: 8px 14px;
      margin-right: 10px;
      background: #0078d4;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>

  <h1>GraphTool Scatter Demo</h1>

  <div>
    <button class="btn" onclick="runPipeline('raw')">RAW</button>
    <button class="btn" onclick="runPipeline('random')">RANDOM</button>
    <button class="btn" onclick="runPipeline('cluster')">CLUSTER</button>
  </div>

  <p id="status"></p>

  <div id="chart"></div>

  <script src="scatter.js"></script>
</body>
</html>
