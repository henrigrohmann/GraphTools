<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>GraphTool</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script defer src="./scatter.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-rows: auto auto 1fr auto auto;
            grid-template-columns: 1fr 360px;
            grid-template-areas:
                "top-admin top-admin"
                "top-ai top-ai"
                "plot right"
                "bottom bottom"
                "footer footer";
            font-family: sans-serif;
            background: #f5f5f5;
        }

        /* 上段（運営） */
        #top-admin {
            grid-area: top-admin;
            padding: 10px;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
        }

        /* 下段（公聴AI機能） */
        #top-ai {
            grid-area: top-ai;
            padding: 10px;
            background: #fafafa;
            border-bottom: 1px solid #ddd;
        }

        button {
            padding: 6px 14px;
            margin-right: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fafafa;
            cursor: pointer;
        }

        button:hover {
            background: #eee;
        }

        /* Plotly */
        #plot {
            grid-area: plot;
            background: #fff;
        }

        /* 右パネル（詳細カード） */
        #right-panel {
            grid-area: right;
            background: #fafafa;
            border-left: 1px solid #ddd;
            padding: 16px;
            overflow-y: auto;
        }

        .card {
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .label {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }

        .value {
            font-size: 14px;
            margin-bottom: 8px;
            white-space: pre-wrap;
        }

        /* 下パネル（デバッグログ） */
        #bottom-panel {
            grid-area: bottom;
            background: #222;
            color: #0f0;
            padding: 8px;
            font-size: 12px;
            height: 120px;
            overflow-y: auto;
            font-family: monospace;
        }

        /* フッターパネル（パンくず + スワイプ干渉回避） */
        #footer-panel {
            grid-area: footer;
            background: #eaeaea;
            padding: 6px 12px;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #ccc;
        }
    </style>
</head>

<body>

<!-- 上段：運営向け -->
<div id="top-admin">
    <button onclick="runInit()">初期化</button>
    <button onclick="runDump()">ダンプ</button>
    <button onclick="runHealthCheck()">ヘルスチェック</button>
    <button onclick="window.open('./api_tester.html', '_blank')">APIテスター</button>

    <span id="api-base-label" style="margin-left:12px;color:#555;font-size:12px;"></span>
    <span id="health-status" style="margin-left:8px;color:#666;font-size:12px;"></span>
</div>

<!-- 下段：公聴AI機能（閲覧者向け） -->
<div id="top-ai">
    <button onclick="runPipeline('raw')">生データ</button>
    <button onclick="runPipeline('cluster')">クラスタリング</button>
    <button onclick="runPipeline('dense')">濃い意見</button>

    <!-- 将来の公聴AI機能（空振り） -->
    <button onclick="runFeature('summary')">要約</button>
    <button onclick="runFeature('representative')">代表意見</button>
    <button onclick="runFeature('compare')">比較</button>
    <button onclick="runFeature('filter')">フィルタ</button>
</div>

<div id="plot"></div>

<div id="right-panel">
    <div class="card">
        <h3>詳細</h3>
        <div id="detail-content">点をクリックしてください</div>
    </div>
</div>

<div id="bottom-panel"></div>

<div id="footer-panel">
    <span id="breadcrumb">Home</span>
</div>

</body>
</html>
