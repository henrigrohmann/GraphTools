<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTool v1.8</title>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script defer src="./charts.js?v=182"></script>


  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #top-buttons {
      padding: 8px;
      background: #fafafa;
      border-bottom: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .top-row-label {
      font-size: 11px;
      color: #666;
      margin-right: 4px;
    }

    button, #top-buttons a {
      padding: 6px 10px;
      border: 1px solid #888;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
      color: inherit;
      font-size: 13px;
    }
    button:hover, #top-buttons a:hover {
      background: #e8e8e8;
    }

    #api-base-panel {
      padding: 4px 8px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #plot {
      flex: 1;
      border-right: 1px solid #ccc;
    }

    #right-panel {
      width: 360px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #tab-buttons {
      display: flex;
      border-bottom: 1px solid #ccc;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      background: #f7f7f7;
      border-right: 1px solid #ccc;
    }
    .tab-btn.active {
      background: #fff;
      font-weight: bold;
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    #log-panel {
      height: 200px;
      border-top: 1px solid #ccc;
      background: #111;
      color: #0f0;
      font-size: 12px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      position: relative;
    }

    #log-panel.collapsed {
      height: 0 !important;
      padding: 0 !important;
      border: none !important;
    }

    #toggle-log {
      position: absolute;
      right: 4px;
      top: 4px;
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 3px;
    }

    #footer {
      padding: 4px 8px;
      background: #f0f0f0;
      border-top: 1px solid #ccc;
      font-size: 13px;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    #breadcrumb-wrapper {
      display: inline-block;
    }

    #breadcrumb-wrapper.hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div id="top-buttons">
    <div class="top-row">
      <span class="top-row-label">運用者:</span>

      <button onclick="loadDefault()">デフォルトデータ</button>

      <input type="file" id="csvFile" accept=".csv" />
      <button onclick="uploadCSV()">CSVアップロード</button>

      <button onclick="dumpData()">ダンプ</button>
      <button onclick="checkHealth()">ヘルスチェック</button>
      <a href="./api_test.html" target="_blank">APIテスト</a>
    </div>

    <div class="top-row">
      <span class="top-row-label">閲覧者:</span>
      <button onclick="loadScatter('raw')">生データ</button>
      <button onclick="loadScatter('cluster')">クラスタリング</button>
      <button onclick="loadScatter('dense')">濃い意見</button>
      <button onclick="loadScatter('treemap')">ツリーマップ</button>
      <button onclick="filterCluster()">フィルタ</button>
    </div>
  </div>

  <div id="api-base-panel">
    API: <span id="api-base-text"></span>
  </div>

  <div id="main">
    <div id="plot"></div>

    <div id="right-panel">
      <div id="tab-buttons">
        <div class="tab-btn active" data-tab="detail">詳細</div>
        <div class="tab-btn" data-tab="hierarchy">階層ビュー</div>
      </div>

      <div id="tab-detail" class="tab-content active">
        <div id="detail-content">点をクリックしてください。</div>
      </div>

      <div id="tab-hierarchy" class="tab-content">
        <div id="hierarchy-content"></div>
      </div>
    </div>
  </div>

  <div id="log-panel">
    <button id="toggle-log" onclick="toggleLogPanel()">▲</button>
  </div>

  <div id="footer">
    <span id="breadcrumb-wrapper" class="hidden">
      現在地: <span id="breadcrumb-text"></span>
    </span>
    <span>モード: <span id="mode-text">-</span></span>
  </div>

</body>
</html>
