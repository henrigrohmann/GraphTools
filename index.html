<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphTool</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ───────────────────────────────
       パネル1：上部ボタン群
    ─────────────────────────────── */
    #top-buttons {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
      flex-wrap: wrap;
    }

    #top-buttons button {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    /* ───────────────────────────────
       パネル2：API Base 表示
    ─────────────────────────────── */
    #api-base {
      padding: 4px 10px;
      font-size: 12px;
      color: #444;
      border-bottom: 1px solid #ddd;
      background: #fcfcfc;
    }

    /* ───────────────────────────────
       パネル3：中央 + 右パネル
    ─────────────────────────────── */
    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #plot-area {
      flex: 1;
      border-right: 1px solid #ccc;
    }

    #right-panel {
      width: 360px;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* タブ */
    #right-tabs {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
    }

    .tab-btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .tab-btn.active {
      background: #0b66c3;
      color: #fff;
      border-color: #0b66c3;
    }

    #tab-contents {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* ───────────────────────────────
       パネル4：ログパネル
    ─────────────────────────────── */
    #log-panel {
      height: 120px;
      border-top: 1px solid #ccc;
      background: #111;
      color: #0f0;
      font-size: 12px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ───────────────────────────────
       パネル5：フッターパネル（パンくず）
    ─────────────────────────────── */
    #footer-panel {
      padding: 6px 10px;
      font-size: 12px;
      background: #f0f0f0;
      border-top: 1px solid #ccc;
      color: #333;
    }
  </style>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script defer src="./scatter.js"></script>
</head>
<body>

  <!-- ───────────────────────────────
       パネル1：上部ボタン群
  ─────────────────────────────── -->
  <div id="top-buttons">
    <button onclick="runPipeline('init')">初期化</button>
    <button onclick="runPipeline('dump')">ダンプ</button>
    <button onclick="runPipeline('health')">ヘルスチェック</button>
    <button onclick="loadScatter('raw')">生データ</button>
    <button onclick="loadScatter('cluster')">クラスタリング</button>
    <button onclick="loadScatter('dense')">濃い意見</button>
    <button onclick="runPipeline('compare')">比較</button>
    <button onclick="runPipeline('filter')">フィルタ</button>
