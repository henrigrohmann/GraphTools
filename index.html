<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTool v1.5</title>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="scatter.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* 上部ボタン行 */
    #top-buttons {
      padding: 6px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      padding: 6px 10px;
      border: 1px solid #888;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #e8e8e8;
    }

    /* API Base 表示 */
    #api-base-panel {
      padding: 4px 8px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }

    /* メイン領域：左（散布図）＋右（詳細/階層） */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #plot {
      flex: 1;
      border-right: 1px solid #ccc;
    }

    /* 右パネル */
    #right-panel {
      width: 360px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* タブボタン */
    #tab-buttons {
      display: flex;
      border-bottom: 1px solid #ccc;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      background: #f7f7f7;
      border-right: 1px solid #ccc;
    }
    .tab-btn.active {
      background: #fff;
      font-weight: bold;
    }

    /* タブ内容 */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* ログパネル */
    #log-panel {
      height: 120px;
      border-top: 1px solid #ccc;
      padding: 6px;
      font-size: 12px;
      overflow-y: auto;
      background: #fafafa;
      white-space: pre-wrap;
    }

    /* フッターパネル（パンくず） */
    #footer {
      padding: 4px 8px;
      background: #f0f0f0;
      border-top: 1px solid #ccc;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <!-- 上部ボタン群（運用者 / 閲覧者を分離した正史配置） -->
  <div id="top-buttons">
    <!-- 運用者向け -->
    <button onclick="fetchJson('/init')">初期化</button>
    <button onclick="fetchJson('/dump')">ダンプ</button>
    <button onclick="fetchJson('/health')">ヘルスチェック</button>

    <!-- 閲覧者向け -->
    <button onclick="loadScatter('raw')">生データ</button>
    <button onclick="loadScatter('cluster')">クラスタリング</button>
    <button onclick="loadScatter('dense')">濃い意見</button>
    <button onclick="fetchJson('/compare')">比較</button>
    <button onclick="fetchJson('/filter')">フィルタ</button>
  </div>

  <!-- API Base 表示 -->
  <div id="api-base-panel">
    API: <span id="api-base-text"></span>
  </div>

  <!-- メイン領域：散布図 + 右パネル -->
  <div id="main">

    <!-- 散布図 -->
    <div id="plot"></div>

    <!-- 右パネル -->
    <div id="right-panel">

      <!-- タブボタン -->
      <div id="tab-buttons">
        <div class="tab-btn active" data-tab="detail">詳細</div>
        <div class="tab-btn" data-tab="hierarchy">階層ビュー</div>
      </div>

      <!-- タブ内容：詳細 -->
      <div id="tab-detail" class="tab-content active">
        <div id="detail-content">点をクリックしてください。</div>
      </div>

      <!-- タブ内容：階層ビュー -->
      <div id="tab-hierarchy" class="tab-content">
        <div id="hierarchy-content">階層データを読み込み中…</div>
      </div>

    </div>
  </div>

  <!-- ログパネル -->
  <div id="log-panel"></div>

  <!-- フッターパネル（パンくず） -->
  <div id="footer">
    <span id="breadcrumb">準備中…</span>
  </div>

</body>
</html>
