<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTools API Test</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      gap: 20px;
      padding: 20px;
    }
    #left-panel {
      width: 300px;
    }
    #debug {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      white-space: pre-wrap;
      overflow-y: scroll;
      background: #fafafa;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="left-panel">
    <h2>API Test Panel</h2>

    <!-- Dummy API Test -->
    <button onclick="testDummy()">Test Dummy API</button>

    <h3>Debug Panel</h3>
    <div id="debug"></div>
  </div>

  <div id="right-panel">
    <h2>Plot Area（今は未使用）</h2>
    <div id="plot" style="width:600px;height:400px;border:1px solid #ddd;"></div>
  </div>

  <!-- data.ts をここにインラインで書く（ラッパー版） -->
  <script>
    /* data.ts (API wrapper) */
    window.api = {
      async getDummy() {
        // Codespaces の FastAPI は 8001 ポート
        // ローカルなら http://localhost:8001/dummy
        const url = "http://localhost:8001/dummy";
        const res = await fetch(url);
        return res.json();
      }
    };

    console.log("data.ts (API wrapper) loaded");
  </script>

  <!-- UI ロジック -->
  <script>
    function logDebug(obj) {
      document.getElementById("debug").textContent =
        typeof obj === "string"
          ? obj
          : JSON.stringify(obj, null, 2);
    }

    async function testDummy() {
      logDebug("Requesting /dummy ...");
      try {
        const result = await window.api.getDummy();
        logDebug(result);
      } catch (err) {
        logDebug("Error: " + err);
      }
    }
  </script>
</body>
</html>
