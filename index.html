<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTools v1.8</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #topbar { padding: 10px; background: #eee; display: flex; gap: 10px; align-items: center; }
    #log { height: 200px; overflow-y: scroll; background: #111; color: #0f0; padding: 10px; font-size: 12px; }
    #graph { width: 100%; height: 500px; border: 1px solid #ccc; }
    #right { width: 300px; padding: 10px; border-left: 1px solid #ccc; }
    #container { display: flex; }
  </style>
</head>
<body>

<div id="topbar">
  <span>GraphTools</span>

  <button onclick="doInit()">Init</button>
  <button onclick="loadScatter('raw')">生データ</button>
  <button onclick="loadScatter('cluster')">クラスタリング</button>
  <button onclick="loadScatter('dense')">濃い意見</button>
  <button onclick="loadDump()">ダンプ</button>

  <input type="file" id="csvfile" />
  <button onclick="uploadCSV()">CSVアップロード</button>

  <span>API:</span>
  <input id="apiBase" value="https://didactic-parakeet-xgrr599556rhpx65-8005.app.github.dev" size="60" />
</div>

<div id="container">
  <div id="graph"></div>
  <div id="right">
    <h3>詳細</h3>
    <pre id="detail"></pre>

    <h3>階層ビュー</h3>
    <pre id="hier"></pre>
  </div>
</div>

<h3>ログ</h3>
<div id="log"></div>

<script>
  function log(msg) {
    const el = document.getElementById("log");
    el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
    el.scrollTop = el.scrollHeight;
  }

  function api() {
    return document.getElementById("apiBase").value;
  }

  async function doInit() {
    const url = api() + "/init";
    log("INIT " + url);
    const res = await fetch(url, { method: "POST" });
    const json = await res.json();
    log("INIT RESULT " + JSON.stringify(json));
  }

  async function loadScatter(mode) {
    const url = api() + "/scatter?mode=" + mode;
    log("FETCH " + url);
    const res = await fetch(url);
    const json = await res.json();
    log("SCATTER READY count=" + json.length);
    document.getElementById("detail").textContent = JSON.stringify(json[0], null, 2);
  }

  async function loadDump() {
    const url = api() + "/dump";
    log("FETCH " + url);
    const res = await fetch(url);
    const json = await res.json();
    log("DUMP " + JSON.stringify(json));
    document.getElementById("hier").textContent = JSON.stringify(json, null, 2);
  }

  async function uploadCSV() {
    const file = document.getElementById("csvfile").files[0];
    if (!file) return alert("ファイルを選択してください");

    const form = new FormData();
    form.append("file", file);

    const url = api() + "/upload";
    log("UPLOAD " + url);

    const res = await fetch(url, { method: "POST", body: form });
    const json = await res.json();
    log("UPLOAD RESULT " + JSON.stringify(json));
  }
</script>

</body>
</html>
