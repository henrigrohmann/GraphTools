<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphTool</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ============================
       トップボタン（2段構成）
       ============================ */
    #top-buttons {
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .top-row-label {
      font-size: 11px;
      color: #666;
      margin-right: 4px;
    }

    #top-buttons button,
    #top-buttons a {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      color: inherit;
    }

    /* ============================
       API Base 表示
       ============================ */
    #api-base {
      padding: 4px 10px;
      font-size: 12px;
      color: #444;
      border-bottom: 1px solid #ddd;
      background: #fcfcfc;
    }

    /* ============================
       メインエリア
       ============================ */
    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    #plot-area {
      flex: 1;
      border-right: 1px solid #ccc;
      min-width: 0;
    }

    #plot {
      width: 100%;
      height: 100%;
    }

    /* ============================
       右パネル
       ============================ */
    #right-panel {
      width: 360px;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    #right-tabs {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
    }

    .tab-btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .tab-btn.active {
      background: #0b66c3;
      color: #fff;
      border-color: #0b66c3;
    }

    #tab-contents {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
      min-height: 0;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    #detail-content,
    #hierarchy-content {
      line-height: 1.5;
      white-space: normal;
      word-break: break-word;
    }
    /* ============================
       ログパネル（運用者用）
       ============================ */
    #log-panel {
      height: 140px;
      border-top: 1px solid #ccc;
      background: #111;
      color: #0f0;
      font-size: 12px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ============================
       フッター（パンくず＋モード）
       ============================ */
    #footer-panel {
      padding: 6px 10px;
      font-size: 12px;
      background: #f0f0f0;
      border-top: 1px solid #ccc;
      color: #333;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
  </style>

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <!-- scatter.js（正史 v1.5） -->
  <script defer src="./scatter.js"></script>
</head>

<body>

  <!-- ============================
       トップボタン（2段構成）
       ============================ -->
  <div id="top-buttons">

    <!-- 運用者 -->
    <div class="top-row">
      <span class="top-row-label">運用者:</span>
      <button onclick="initApp()">初期化</button>
      <button onclick="loadData()">データ読み込み</button>
      <button onclick="dumpData()">ダンプ</button>
      <button onclick="checkHealth()">
  <!-- ============================
       ログパネル（運用者用）
       ============================ -->
  <div id="log-panel"></div>

  <!-- ============================
       フッター（パンくず＋モード）
       ============================ -->
  <div id="footer-panel">
    <div>現在地: <span id="breadcrumb-text">散布図</span></div>
    <div>モード: <span id="mode-text">cluster</span></div>
  </div>

</body>
</html>
