<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>GraphTool Scatter Demo</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f7f7f7;
    }

    #top-panel {
      height: 60px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-sizing: border-box;
      gap: 8px;
    }

    #middle-panel {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 16px;
      box-sizing: border-box;
      gap: 16px;
    }

    #chart {
      flex: 1;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      padding: 8px;
    }

    #right-panel {
      width: 360px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      overflow-y: auto;
      background: #fafafa;
      box-sizing: border-box;
    }

    #bottom-panel {
      height: 220px;
      background: #fff8e1;
      border-top: 1px solid #ffe0a3;
      border-bottom: 1px solid #e0c080;
      padding: 16px;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-y: scroll;
      box-sizing: border-box;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div id="top-panel">
    <button id="btn-init">初期化</button>
    <button id="btn-load">DB登録</button>
    <button id="btn-dump">データ確認</button>
    <span style="margin-left:12px; opacity:0.7;">（DB操作パネル）</span>
  </div>

  <div id="middle-panel">
    <div id="chart"></div>

    <div id="right-panel">
      <h2 style="margin-top:0;">詳細</h2>
      <div id="detail-content" style="white-space:pre-wrap;"></div>
    </div>
  </div>

  <div id="bottom-panel">Debug log will appear here...</div>

  <!-- ★★★ data.js を正しく読み込む（ここが最重要） -->
  <script src="data.js?v=1"></script>

  <!-- scatter.js は data.js の後 -->
  <script src="scatter.js?v=1"></script>

  <script>
    function log(msg) {
      const panel = document.getElementById("bottom-panel");
      panel.textContent += "\n" + msg;
      panel.scrollTop = panel.scrollHeight;
    }

    log("index.html loaded");

    try {
      log("buildScatterData() called");
      const data = window.buildScatterData();

      if (!window.publicOpinionData) {
        log("ERROR: publicOpinionData is undefined");
      } else {
        log("publicOpinionData length = " + window.publicOpinionData.length);
      }

      const layout = window.buildLayout();
      log("Plotly data/layout built");

      Plotly.newPlot("chart", data, layout);
      log("Plotly chart rendered");

      window.attachPlotEvents(document.getElementById("chart"));
      log("Plot events attached");
    } catch (e) {
      log("ERROR during Plotly init: " + e);
    }

    document.getElementById("btn-init").onclick = () => {
      log("[DB] 初期化ボタンが押されました");
    };

    document.getElementById("btn-load").onclick = () => {
      log("[DB] DB登録ボタンが押されました");
    };

    document.getElementById("btn-dump").onclick = () => {
      log("[DB] データ確認ボタンが押されました");
    };
  </script>

</body>
</html>
